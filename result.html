<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Audit Result</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">
            <div class="result-box">
                <h1>AI Audit Result</h1>
                <p><strong>Tool:</strong></p>
                <p id="tool"></p>
                <p><strong>Monthly Spend:</strong></p>
                <p id="spend"></p>
                <div class="card">
                <p><h3>Recommendation:</h3></p>
                <p id="recommendation"></p>
                </div>
                <div class="card">
                <p><h3>Estimated Savings:</h3></p>
                <p id="savings"></p>
                </div>
                <div class="card">
                <p><h3>Risk Level:</h3></p>
                <p id="risk"></p>
                </div>
                <div class="card">
                    <h3>Optimization Score</h3>
                    <p id="score"></p>
                </div>
            </div>
        </div>
    <script src="result.js"></script>
    </body>
</html>
